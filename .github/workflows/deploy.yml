name: Build verify

# 部署改走家裡 server (deploy.sh)。這個 workflow 只在 PR 上做 build 驗證，
# 確保推進 main 之前 next build 不會壞。
# 不再推到 GitHub Pages（show.intelliverse.tw 已切到 home server）。

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

      - name: Confirm out/ produced
        run: ls -la out/index.html out/robots.txt out/sitemap.xml
